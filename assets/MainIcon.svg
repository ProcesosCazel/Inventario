<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-labelledby="title desc">
  <title id="title">MainIcon - Inventario EOAT</title>
  <desc id="desc">Gripper simple con un engranaje, tema azul oscuro</desc>

  <!-- Fondo redondeado (tema azul oscuro) -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#0B3D91"/>

  <!-- Cuerpo del gripper (azul claro para diferenciar del fondo) -->
  <rect x="12" y="8" width="8" height="6" rx="1.2" fill="#4F9CF9"/>

  <!-- Pinzas (alto contraste en blanco) -->
  <line x1="12" y1="11" x2="8"  y2="15" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="11" x2="24" y2="15" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Engranaje simple (amarillo para resaltar) -->
  <g fill="#F5C542" transform="translate(0,0)">
    <!-- Centro del engranaje -->
    <circle cx="15.5" cy="21" r="3.2"/>
    <!-- Orificio interior para mayor legibilidad -->
    <circle cx="15.5" cy="21" r="1.2" fill="#0B3D91"/>

    <!-- Dientes (6 dientes para claridad a tamaños pequeños) -->
    <!-- Diente superior -->
    <rect x="14.9" y="16.2" width="1.2" height="1.6" rx="0.3"/>
    <!-- Resto de dientes rotados alrededor del centro -->
    <rect x="14.9" y="16.2" width="1.2" height="1.6" rx="0.3" transform="rotate(60 15.5 21)"/>
    <rect x="14.9" y="16.2" width="1.2" height="1.6" rx="0.3" transform="rotate(120 15.5 21)"/>
    <rect x="14.9" y="16.2" width="1.2" height="1.6" rx="0.3" transform="rotate(180 15.5 21)"/>
    <rect x="14.9" y="16.2" width="1.2" height="1.6" rx="0.3" transform="rotate(240 15.5 21)"/>
    <rect x="14.9" y="16.2" width="1.2" height="1.6" rx="0.3" transform="rotate(300 15.5 21)"/>
  </g>
</svg>
