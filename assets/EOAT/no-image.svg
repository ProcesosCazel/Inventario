<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">

  <!-- Background -->
  <rect width="400" height="300" fill="#f2f2f2" rx="12"/>

  <!-- Image frame -->
  <rect x="60" y="50" width="280" height="160" fill="none" stroke="#888" stroke-width="4" rx="8"/>

  <!-- Mountain shape -->
  <polygon points="90,180 150,120 210,180" fill="#bbb"/>

  <!-- Second mountain -->
  <polygon points="170,180 230,140 300,180" fill="#999"/>

  <!-- Sun -->
  <circle cx="270" cy="90" r="18" fill="#bbb"/>

  <!-- Slash line (indicating missing image) -->
  <line x1="70" y1="60" x2="330" y2="200" stroke="#cc0000" stroke-width="6"/>

  <!-- Text -->
  <text x="200" y="250"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        fill="#555">
    Sin imagen disponible
  </text>

</svg>